// ── Helpers ──────────────────────────────────────────────────────────────
function roundRect(x, y, w, h, r, fill, stroke, sw=1) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill)  { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke){ ctx.strokeStyle = stroke; ctx.lineWidth = sw; ctx.stroke(); }
}

function text(str, x, y, size, color, align='left', bold=false, italic=false) {
  ctx.fillStyle = color;
  ctx.font = `${italic?'italic ':''}${bold?'bold ':''}${size}px 'Segoe UI', Arial`;
  ctx.textAlign = align;
  ctx.fillText(str, x, y);
}

function arrow(x1, y1, x2, y2, color=P.teal, dashed=false) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  if (dashed) { ctx.setLineDash([8,5]); } else { ctx.setLineDash([]); }
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.setLineDash([]);
  // arrowhead
  const angle = Math.atan2(y2 - y1, x2 - x1);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - 12*Math.cos(angle-0.4), y2 - 12*Math.sin(angle-0.4));
  ctx.lineTo(x2 - 12*Math.cos(angle+0.4), y2 - 12*Math.sin(angle+0.4));
  ctx.closePath();
  ctx.fill();
}

function biArrow(x1, y1, x2, y2, color=P.teal) {
  arrow(x1, y1, x2, y2, color);
  arrow(x2, y2, x1, y1, color);
}

function label(txt, x, y, bgColor, textColor=P.navy, size=18) {
  ctx.font = `bold ${size}px 'Segoe UI', Arial`;
  const w = ctx.measureText(txt).width + 20;
  roundRect(x - w/2, y - 14, w, 26, 5, bgColor, null);
  text(txt, x, y + 5, size, textColor, 'center', true);
}

function shadow(x, y, w, h) {
  ctx.shadowColor = 'rgba(0,0,0,0.35)';
  ctx.shadowBlur = 18;
  ctx.shadowOffsetX = 4;
  ctx.shadowOffsetY = 6;
}
function noShadow() {
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;
}
